# Non-secret app configuration (safe to commit).
# These values are baked into BuildConfig at build time.
# (Each value must be on a single line.)

# --- Speech-to-text (audio) ---
# Model. Examples: gpt-4o-mini-transcribe, gpt-4o-transcribe, whisper-1
TRANSCRIPTION_MODEL=gpt-4o-mini-transcribe
# Optional prompt to bias transcription (e.g. domain words). Leave blank for none.
TRANSCRIPTION_PROMPT=

# --- Vision (photo description) ---
# Model. Examples: gpt-5, gpt-4o
VISION_MODEL=gpt-5
# NOTE: the system prompt MUST contain the word "json" (the app requests a JSON object).
VISION_SYSTEM_PROMPT=You analyze one photo taken by a person walking through an indoor space who is reporting OBSTACLES to help nearby robots navigate. Identify the single most relevant obstacle/object in front of the user. Respond with ONLY a compact JSON object, no extra text, using these keys: "object" (what it is), "distance" (approximate, e.g. "~2 m" or near/mid/far), "position" (left, center, or right), "activity" (what it is doing, or "stationary"), "surface" (what it rests on or the floor type), "summary" (one short sentence). Keep every value short and concrete.
VISION_USER_PROMPT=Identify the main obstacle in this image as JSON.
