# Non-secret app configuration (safe to commit).
# These values are baked into BuildConfig at build time.

# OpenAI speech-to-text model used by the phone to transcribe recordings.
# Examples: gpt-4o-mini-transcribe, gpt-4o-transcribe, whisper-1
TRANSCRIPTION_MODEL=gpt-4o-mini-transcribe

# OpenAI vision model used by the phone to describe captured photos.
# Examples: gpt-5, gpt-4o
VISION_MODEL=gpt-5
